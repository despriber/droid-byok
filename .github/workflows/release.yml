name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  python-packages:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build packages
        run: |
          python -m pip install --upgrade build twine
          python -m build
          python -m twine check dist/*

      - uses: actions/upload-artifact@v4
        with:
          name: python-packages
          path: dist/*

  standalone-binaries:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-22.04
            asset: linux-x86_64
          - runner: ubuntu-24.04-arm
            asset: linux-arm64
          - runner: macos-13
            asset: macos-x86_64
          - runner: macos-14
            asset: macos-arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build standalone binary
        shell: bash
        run: |
          python -m pip install --upgrade pip pyinstaller
          python -m pip install .
          pyinstaller \
            --clean \
            --noconfirm \
            --onefile \
            --name droid-byok \
            --paths src \
            --hidden-import droid_byok.tui \
            --collect-all textual \
            --distpath dist-binary \
            packaging/entrypoint.py

          mkdir -p release-assets
          archive="droid-byok-${{ matrix.asset }}.tar.gz"
          tar -czf "release-assets/${archive}" -C dist-binary droid-byok
          cd release-assets
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "$archive" > "${archive}.sha256"
          else
            shasum -a 256 "$archive" > "${archive}.sha256"
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.asset }}
          path: release-assets/*

  publish-release:
    needs:
      - python-packages
      - standalone-binaries
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          gh release view "$TAG" >/dev/null 2>&1 || \
            gh release create "$TAG" --generate-notes --title "droid-byok $TAG"
          gh release upload "$TAG" release-assets/* --clobber
